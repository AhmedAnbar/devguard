name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']

    name: PHP ${{ matrix.php }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest --colors=always

      - name: Run static analysis
        run: vendor/bin/phpstan analyse --no-progress

  action-smoke-pass:
    name: Action smoke-test (good fixture must exit 0)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run published action against good fixture
        uses: AhmedAnbar/devguard-action@v1
        with:
          tool: deploy
          path: tests/Fixtures/sample-laravel-app-good

  action-smoke-fail:
    name: Action smoke-test (bad fixture must exit 1)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run published action against bad fixture
        id: scan
        continue-on-error: true
        uses: AhmedAnbar/devguard-action@v1
        with:
          tool: deploy
          path: tests/Fixtures/sample-laravel-app-bad

      - name: Assert scan exited with code 1
        env:
          EXIT_CODE: ${{ steps.scan.outputs.exit-code }}
        run: |
          if [ "$EXIT_CODE" != "1" ]; then
            echo "Expected DevGuard to exit 1 on the bad fixture, got: $EXIT_CODE"
            exit 1
          fi
          echo "Action correctly reported failure on the bad fixture."
